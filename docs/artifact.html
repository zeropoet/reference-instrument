<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artifact</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="artifact" class="artifact-page"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const hash = params.get("hash");
        const root = document.getElementById("artifact");

        function artifactBaseUrl() {
            const owner = window.location.hostname.split(".")[0];
            const [repo] = window.location.pathname
                .split("/")
                .filter(Boolean);

            if (window.location.hostname.endsWith("github.io") && owner && repo) {
                return `https://raw.githubusercontent.com/${owner}/${repo}/main/artifacts`;
            }

            return "../artifacts";
        }

        async function load() {
            if (!hash) {
                root.innerHTML = "<p>Missing artifact hash.</p>";
                return;
            }

            const displayHash = hash.slice(0, 9);
            const base = `${artifactBaseUrl()}/${hash}`;
            const preload = document.createElement("link");
            preload.rel = "preload";
            preload.as = "image";
            preload.href = `${base}/sigil.svg`;
            document.head.appendChild(preload);

            const metadataResponse = await fetch(`${base}/metadata.json`);
            if (!metadataResponse.ok) {
                throw new Error("metadata");
            }

            const metadata = await metadataResponse.json();
            const timestamp = Number(metadata.timestamp);
            const readableTimestamp = Number.isFinite(timestamp)
                ? new Date(timestamp * 1000).toLocaleString(undefined, {
                    dateStyle: "medium",
                    timeStyle: "medium"
                })
                : metadata.timestamp;

            root.innerHTML = `
                <p><a href="./archive.html">back to archive</a></p>
                <h1>ARTIFACT</h1>
                <p class="statement">Deterministic artifact generated by the Reference Instrument.</p>
                <p><code>${displayHash}</code></p>
                <div class="artifact-detail-card">
                    <img class="artifact-detail-sigil" src="${base}/sigil.svg" alt="Sigil artifact ${hash}">
                    <img class="artifact-detail-qr" src="${base}/artifact_qr.png" alt="QR code for artifact ${hash}">
                    <p>artifact hash<br><code>${metadata.artifact_hash}</code></p>
                    <p>memory hash<br><code>${metadata.memory_hash}</code></p>
                    <p>events<br><code>${metadata.event_count}</code></p>
                    <p>kernel<br><code>${metadata.kernel}</code></p>
                    <p>timestamp<br><code>${readableTimestamp}</code></p>
                    <p>metadata</p>
                    <pre>${JSON.stringify(metadata, null, 2)}</pre>
                </div>
            `;
        }

        load().catch(() => {
            root.innerHTML = "<p>Unable to load artifact.</p><p><a href='./archive.html'>back to archive</a></p>";
        });
    </script>
</body>
</html>
